<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Responsive Image Gallery</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f4f4;
      color: #333;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    /* Filter Buttons */
    .filters {
      text-align: center;
      margin-bottom: 25px;
    }

    .filters button {
      padding: 10px 18px;
      margin: 5px;
      border: none;
      border-radius: 25px;
      background: #333;
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .filters button:hover,
    .filters button.active {
      background: #ff9800;
      transform: scale(1.05);
    }

    /* Gallery Grid */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 18px;
      max-width: 1200px;
      margin: auto;
    }

    .gallery-item {
      position: relative;
      overflow: hidden;
      border-radius: 15px;
      cursor: pointer;
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }

    .gallery-item img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease, filter 0.5s ease;
    }

    /* Hover Effects */
    .gallery-item:hover img {
      transform: scale(1.1);
      filter: brightness(0.8) saturate(1.2);
    }

    .gallery-item:hover {
      transform: translateY(-6px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.4s ease;
      color: white;
      font-size: 1.2rem;
      font-weight: bold;
    }

    .gallery-item:hover .overlay {
      opacity: 1;
    }

    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn 0.3s ease;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 80vh;
      border-radius: 10px;
      transition: transform 0.3s ease;
    }

    .lightbox img:hover {
      transform: scale(1.02);
    }

    /* Controls */
    .close,
    .prev,
    .next {
      position: absolute;
      color: white;
      font-size: 2rem;
      cursor: pointer;
      user-select: none;
      transition: 0.3s;
    }

    .close:hover,
    .prev:hover,
    .next:hover {
      color: #ff9800;
      transform: scale(1.15);
    }

    .close {
      top: 20px;
      right: 30px;
    }

    .prev {
      left: 30px;
      top: 50%;
      transform: translateY(-50%);
    }

    .next {
      right: 30px;
      top: 50%;
      transform: translateY(-50%);
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .gallery-item img {
        height: 220px;
      }

      .prev,
      .next {
        font-size: 1.6rem;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 12px;
      }

      .gallery {
        gap: 12px;
      }

      .gallery-item img {
        height: 200px;
      }

      .filters button {
        padding: 8px 14px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>

  <h1>Responsive Image Gallery</h1>

  <!-- Filter Buttons -->
  <div class="filters">
    <button class="active" onclick="filterGallery('all', event)">All</button>
    <button onclick="filterGallery('nature', event)">Nature</button>
    <button onclick="filterGallery('city', event)">City</button>
    <button onclick="filterGallery('animals', event)">Animals</button>
  </div>

  <!-- Gallery -->
  <div class="gallery" id="gallery">

    <div class="gallery-item nature">
      <img src="https://picsum.photos/id/1015/600/400" alt="Nature">
      <div class="overlay">Nature</div>
    </div>

    <div class="gallery-item city">
      <img src="https://picsum.photos/id/1011/600/400" alt="City">
      <div class="overlay">City</div>
    </div>

    <div class="gallery-item animals">
      <img src="https://picsum.photos/id/1025/600/400" alt="Animals">
      <div class="overlay">Animals</div>
    </div>

    <div class="gallery-item nature">
      <img src="https://picsum.photos/id/1016/600/400" alt="Nature">
      <div class="overlay">Nature</div>
    </div>

    <div class="gallery-item city">
      <img src="https://picsum.photos/id/1031/600/400" alt="City">
      <div class="overlay">City</div>
    </div>

    <div class="gallery-item animals">
      <img src="https://picsum.photos/id/1074/600/400" alt="Animals">
      <div class="overlay">Animals</div>
    </div>

  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <span class="close">&times;</span>
    <span class="prev">❮</span>
    <img id="lightbox-img" src="" alt="">
    <span class="next">❯</span>
  </div>

  <script>
    const galleryItems = document.querySelectorAll('.gallery-item img');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const closeBtn = document.querySelector('.close');
    const prevBtn = document.querySelector('.prev');
    const nextBtn = document.querySelector('.next');

    let currentIndex = 0;

    // Open lightbox
    galleryItems.forEach((img, index) => {
      img.addEventListener('click', () => {
        currentIndex = index;
        showImage();
        lightbox.style.display = 'flex';
      });
    });

    function showImage() {
      lightboxImg.src = galleryItems[currentIndex].src;
      lightboxImg.alt = galleryItems[currentIndex].alt;
    }

    // Next image
    nextBtn.addEventListener('click', () => {
      currentIndex = (currentIndex + 1) % galleryItems.length;
      showImage();
    });

    // Previous image
    prevBtn.addEventListener('click', () => {
      currentIndex = (currentIndex - 1 + galleryItems.length) % galleryItems.length;
      showImage();
    });

    // Close lightbox
    closeBtn.addEventListener('click', () => {
      lightbox.style.display = 'none';
    });

    // Close when clicking outside image
    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) {
        lightbox.style.display = 'none';
      }
    });

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (lightbox.style.display === 'flex') {
        if (e.key === 'ArrowRight') nextBtn.click();
        if (e.key === 'ArrowLeft') prevBtn.click();
        if (e.key === 'Escape') lightbox.style.display = 'none';
      }
    });

    // Filter gallery
    function filterGallery(category, event) {
      const items = document.querySelectorAll('.gallery-item');
      const buttons = document.querySelectorAll('.filters button');

      buttons.forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');

      items.forEach(item => {
        if (category === 'all' || item.classList.contains(category)) {
          item.style.display = 'block';
          item.style.opacity = '1';
          item.style.transform = 'scale(1)';
        } else {
          item.style.opacity = '0';
          item.style.transform = 'scale(0.9)';
          setTimeout(() => {
            item.style.display = 'none';
          }, 300);
        }
      });
    }
  </script>

</body>
</html>
